name: CI

# Corre en cada push y en cada PR a main. Si cualquier check falla, el job
# queda en rojo en GitHub (no es solo un warning).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      # Los 2 checks van separados. `if: always()` hace que corran ambos aunque
      # uno falle, para ver todas las fallas en una sola corrida; igual cada
      # falla marca el job como fallido.
      - name: Lint (next lint)
        run: npm run lint

      - name: Build (next build)
        if: ${{ always() }}
        run: npm run build
